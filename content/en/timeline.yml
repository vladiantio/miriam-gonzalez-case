entries:
  - date: '2021, Background'
    title: A first warning that went unanswered
    description: >
      Miriam goes to the emergency room due to bleeding in the breast. An ultrasound is
      performed. The result is normal. And that's where it ends.
    highlight: false

  - date: 'October 31, 2023, Symptoms'
    title: Back pain begins
    description: >
      Miriam begins to notice persistent lower back pain. Weeks of physiotherapy and
      consultations with no clear answer. Until she requests an MRI herself.
    highlight: false

  - date: 'January 11, 2024, Diagnosis'
    title: The result arrives by email
    description: >
      The MRI report arrives by email on a Thursday morning. The conclusion: "probable
      vertebral metastases." No doctor present. No context. Just a screen. That same day,
      Miriam is admitted to the emergency room. The following Tuesday she receives the full
      diagnosis: stage IV breast cancer with neuroendocrine differentiation, multiple bone
      metastases, and spinal cord compression at L3. She is 32 years old. That same Tuesday,
      radiotherapy begins on the affected vertebrae.
    highlight: true

  - date: 'January–February 2024, First line'
    title: 'Treatment: Letrozole + Ribociclib'
    description: >
      First-line treatment begins with letrozole, ribociclib, Zoladex (goserelin), and
      zoledronic acid. After the first cycle, Miriam is urgently admitted with acute
      respiratory failure. Ribociclib is permanently discontinued.
    highlight: false

  - date: 'February–April 2024, Urgent admission'
    title: '50 days hospitalized, 10 in ICU'
    description: >
      The severe neutropenia caused by ribociclib led to bilateral necrotizing pneumonia
      with areas of pulmonary necrosis. Miriam is admitted to the ICU with severe respiratory
      failure, critically low platelet counts, and the need for high-flow respiratory support.
      Bronchoscopy, transfusions, and intensive antibiotic therapy are required. Total hospital
      stay exceeds 50 days. This was the most critical moment since diagnosis.
    highlight: true
    image: /img/hospital.jpg

  - date: 'July 2024, DIPCAN'
    title: The tumor reveals its molecular identity
    description: >
      Miriam participates in the DIPCAN study, enabling a complete genomic analysis of the
      tumour (TSO500). The results reveal the key markers: FGFR1 amplified ×13, CCND1 ×20,
      FGF3/4/19 ×18 (11q13 cluster). The analysis also detects a striking discrepancy in the
      progesterone receptor (PR): the same tumour sample returns 5% at the local laboratory
      but 100% at the external reference laboratory — a difference with direct implications
      for hormonal treatment decisions.
    highlight: true

  - date: 'January 2025, Second line'
    title: 'Treatment: Fulvestrant + Abemaciclib'
    description: >
      Following confirmed progression on PET-CT, second-line treatment begins: letrozole
      is switched to fulvestrant and ribociclib to abemaciclib. Zoladex continued.
    highlight: false

  - date: 'March 2026, Progression'
    title: Bone progression — abemaciclib discontinued
    description: >
      PET-CT confirms new bone foci. Progression is the main reason for the change in
      strategy. Abemaciclib is also discontinued due to hepatic toxicity (DILI G2-3),
      though not severe. The rest of the treatment — Zoladex and zoledronic acid —
      continues. Active search for a third line begins.
    highlight: false

  - date: 'April 2026, Week 1'
    title: The team forms and the search begins
    description: >
      Miriam begins researching her own case with artificial intelligence. A thread on Twitter.
      A few professionals who see it and say: I can help. Within days, a spontaneous
      multidisciplinary team forms with specialists from four countries.
    highlight: true
    link: https://x.com/miriamgonp/status/2041824144484917749
    linkLabel: 'See the original thread on Twitter →'

  - date: 'April 8–9, 2026, AI'
    title: Clinical documentation generated with AI
    description: >
      A complete clinical summary of the case is generated using advanced language models.
      The document is designed for international second opinions and to communicate the case
      to high-level specialists.
    highlight: true
    link: https://x.com/javilop/status/2041905341059973294
    linkLabel: 'See documentation thread →'

  - date: 'April 2026, OUTREACH'
    title: Talk at Codemotion Madrid
    description: >
      Miriam takes the stage at Codemotion Madrid to talk about how AI is helping advance
      her case. First public outreach event of the project and her return to the tech
      ecosystem after two years.
    highlight: true
    link: https://x.com/miriamgonp/status/2046266823209890162
    linkLabel: 'See the thread on Twitter →'
