coreTeam:
- role: The patient
  description: Software engineer and tech communicator. Actively researches her own
    case combining precision oncology and artificial intelligence. Coordinates the
    entire initiative.
  icon: ph:user-circle-fill
  color: gold
- role: AI & Clinical Documentation Experts
  description: Artificial intelligence experts. Generate and structure the clinical
    documentation using advanced language models, bridging the technical and medical
    domains.
  icon: ph:brain-fill
  color: ocean
- role: Bioinformatics & Clinical Decision Expert
  description: PhD candidate in bioengineering applied to health sciences. Has worked
    on machine learning models for drug response prediction from gene expression data
    — one of the research lines most directly relevant to Miriam's molecular profile.
    Helps interpret molecular data and define the next steps in the diagnostic and
    therapeutic plan.
  icon: ph:strategy-fill
  color: gold
- role: Web & Communication
  description: Manages the website, keeps information up to date, and ensures everything
    is understandable for any visitor.
  icon: ph:code-fill
  color: ocean
- role: Strategy & Healthcare Navigation
  description: Direct experience navigating the Spanish healthcare system to access
    complex treatments. Provides strategic advice and knowledge of the regulatory
    context.
  icon: ph:compass-fill
  color: ink
- role: The human side of the story
  description: 'Responsible for telling Miriam''s story from the inside: who she is
    beyond the diagnosis, what drives her, and why this case matters beyond oncology.'
  icon: ph:pen-nib-fill
  color: gold
medicalNetwork:
- role: Precision Oncologist (USA)
  description: Globally recognized as one of the 25 most influential voices in precision
    medicine. Associate Director of Clinical Research in precision oncology, with
    over 950 scientific publications and responsible for bringing 8 drugs to FDA approval.
    Interested in Miriam's case for discussion in international precision oncology
    networks.
  icon: ph:stethoscope-fill
  color: gold
- role: Molecular Oncologist (Europe)
  description: Internationally recognized specialist in molecular oncology. Supports
    the molecular analysis strategy, coordinates with reference laboratories, and
    validates the clinical approach.
  icon: ph:stethoscope-fill
  color: gold
- role: Radiation Oncology Specialist (Spain)
  description: Brings the case to the multidisciplinary tumor committee. Direct connection
    to advanced therapy trials relevant to this profile.
  icon: ph:atom-fill
  color: ocean
- role: Treating Oncologist (Spain)
  description: Treating oncologist who has followed the case since diagnosis. Open
    to new approaches and continuously updating her knowledge on the latest precision
    oncology advances.
  icon: ph:stethoscope-fill
  color: ink
integrativeSupport:
- role: Metabolic Oncology (Spain)
  description: Specialist in the metabolic approach to cancer. Designs Miriam's supplementation
    and metabolic support protocol.
  icon: ph:flask-fill
  color: ocean
- role: Doctor of Sport Sciences & Exercise Oncology (Spain)
  description: Principal investigator at Fundación OncSport — Never Surrender. Designs
    and supervises Miriam's individualised training programme, adapted to her bone
    metastasis situation. The goal is to keep her at ECOG 0 — meaning full functional
    capacity — which is critical for accessing clinical trials and tolerating upcoming
    treatments.
  icon: ph:barbell-fill
  color: ocean
- role: Oncology Nutritionist
  description: Specialised in nutrition for oncology patients. Monitors Miriam's nutritional
    follow-up throughout treatment.
  icon: ph:plant-fill
  color: gold
- role: Oncology Psychology (AECC Association)
  description: Psychologist specialised in emotional support for people with cancer.
    Collaborates through the AECC Association.
  icon: ph:heart-fill
  color: gold
- role: Psychology & High Abilities
  description: Psychologist specialising in high abilities. Supports Míriam by integrating
    the cognitive and emotional dimensions of her process.
  icon: ph:brain-fill
  color: ocean
- role: Physiotherapy & Acupuncture (Traditional Chinese Medicine)
  description: Physiotherapist trained in traditional Chinese medicine. Complements
    Miriam's exercise and mobility programme.
  icon: ph:hand-palm-fill
  color: ink
